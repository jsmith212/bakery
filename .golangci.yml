version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - misspell
    - nilerr
    - noctx
    - unconvert
    - usestdlibvars
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (io.Closer).Close
    staticcheck:
      checks:
        - all

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - internal/db/repository
    rules:
      - path: _test\.go$
        linters:
          - bodyclose
          - errcheck
          - noctx

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/jsmith212/bakery

  exclusions:
    generated: lax
    paths:
      - internal/db/repository

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
