services:
  bakery:
    image: ghcr.io/jsmith212/bakery
    container_name: bakery
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - stack.env
    # M1's binary connects to Postgres at boot: it takes the advisory boot lock and
    # applies the migrations before it binds a listener. It cannot start without a
    # database, so unlike M0 it waits for one. service_healthy, not service_started:
    # the postgres container accepts a TCP connection well before the server is
    # ready to answer, and a `restart: unless-stopped` crash loop is a slow, noisy
    # way to rediscover that.
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # STORAGE_DIR. Local disk is the only storage driver in M1 (S3 is deferred),
      # so this volume IS the cache. Losing it loses every cached artifact -- which
      # is survivable, since a cache miss is a rebuild, not data loss.
      - bakery-data:/var/lib/bakery
      # GROUP_MAP_FILE. The login gate, the site-admin groups and the OIDC half of
      # every org membership are read from this file, so it IS the authorization
      # policy; a malformed one is a boot failure, not a warning. It is OPTIONAL:
      # with no group map, any successful OIDC auth is admitted and every membership
      # is an in-app grant (ALLOW_SELF_SERVE_ORGS / ALLOW_LOCAL_SITE_ADMINS in
      # stack.env govern those). Commented out because a bind mount of a file that
      # does not exist makes docker create a DIRECTORY at that path, and the boot
      # error ("is a directory") sends you looking in the wrong place entirely --
      # and because GROUP_MAP_FILE ships commented out in stack.env.tmpl to match.
      # Enabling group mapping is the three-part act documented next to
      # GROUP_MAP_FILE in stack.env.tmpl; this mount is step 2 of it.
      # - ./groups.json:/etc/bakery/groups.json:ro

    # Still no healthcheck, and it is still deliberate. The image is
    # gcr.io/distroless/static-debian12: no shell, no curl, no wget. M1 grew the
    # binary a whole API client (`bakery whoami`, `bakery org list`, ...), so the
    # container CAN now make an HTTP request to itself -- but every one of those
    # verbs needs a credential and a token cache, and a healthcheck that reports
    # unhealthy because nobody has run `bakery login` inside the container is worse
    # than none. There is deliberately no unauthenticated self-probe verb: the
    # health endpoints are GET /healthz (liveness) and GET /readyz (readiness, and
    # it really does ping the pool). Probe them from outside, where your
    # orchestrator already lives.
    #
    # /metrics is NOT on this listener and is not published here. It carries every
    # org and project slug and their stored byte counts. METRICS_ADDR defaults to
    # loopback, which inside a container means "reachable from nothing"; to scrape
    # it, set METRICS_ADDR=0.0.0.0:9090 and attach your Prometheus to this
    # network -- do NOT add 9090 to the ports: list above.

  db:
    image: postgres:18-alpine
    container_name: db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 1s
      timeout: 5s
      retries: 5
    # BOUND TO LOOPBACK ON PURPOSE. bakery reaches the database over the compose
    # network (DB_URL host is `db`), so the stack needs nothing published here. A
    # bare "5432:5432" binds 0.0.0.0 -- on any host with a public NIC that puts the
    # database, holding every session, api_key hash and org/project row, one weak
    # POSTGRES_PASSWORD away from the internet. 127.0.0.1 keeps the port reachable
    # for a local `psql`/debugger and nothing else. To scrape it from another host,
    # widen this deliberately; do not drop the 127.0.0.1.
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - stack.env
    # Postgres 18 moved PGDATA to a major-version-specific subdirectory
    # (/var/lib/postgresql/18/docker) and wants a single mount one level up, at
    # /var/lib/postgresql. Mounting the pre-18 path (/var/lib/postgresql/data)
    # leaves PGDATA outside the volume and the server refuses to start.
    volumes:
      - db-data:/var/lib/postgresql

volumes:
  db-data:
    driver: local
  bakery-data:
    driver: local
