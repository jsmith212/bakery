name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # Pinned rather than read from web/package.json: that file declares no
      # `engines.node`, which is the only thing node-version-file reads there.
      # Keep this major in step with the node stage in the Dockerfile.
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: extractions/setup-just@v3

      - name: Check
        run: just check

  build:
    runs-on: ubuntu-latest

    # dbtest uses TEST_DB_URL when it is set and never touches Docker. Without it,
    # every package with DB tests would spawn its own postgres container on the
    # runner -- correct, but slower and needlessly fragile.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    # The default postgres role is superuser and therefore has CREATEDB, which
    # dbtest needs: it clones a migrated template with CREATE DATABASE ... TEMPLATE.
    env:
      TEST_DB_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: extractions/setup-just@v3

      - name: Build
        run: just build

      # `just test-db` fails the job if ANY test skipped. dbtest skips -- it does
      # not fail -- when it can reach neither docker nor TEST_DB_URL, so without
      # this the whole database half of the suite could go green in CI without
      # executing a single query, and the log would not say so. The skip check is
      # the only thing that proves the postgres service above is actually wired to
      # the tests.
      - name: Tests (DB-backed; a skip fails the job)
        run: just test-db

      # The race detector is the ONLY thing that enforces the concurrency tests'
      # reason to exist: TestLRU_ConcurrentAccessIsRaceFree has no assertions, and
      # TestRefcountRace_IncrefDecrefDelete's value is what -race reports while the
      # goroutines contend. `just test-db` and `just coverage` both run without
      # -race, so without this step an unsynchronised int64 counter or a torn read
      # of a Meta value sails through CI green. TEST_DB_URL is set for this job, so
      # the DB-backed race test runs against the postgres service too.
      - name: Race
        run: just race

      - name: Coverage
        run: just coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage*

      - name: Upload the test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: build/test-db.log

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bakery
          path: build/bakery

  # The conformance proof: drive the REAL bitbake fetcher and the real wget binary
  # against the real sstate backend. It is a SEPARATE job from `build` because it has
  # a dependency `build` does not -- a bitbake checkout -- and because a conformance
  # test that silently skips is the exact failure this milestone must not have, so it
  # runs through `just conformance`, where a skip fails the job.
  conformance:
    runs-on: ubuntu-latest

    # Same postgres service as `build`: dbtest uses TEST_DB_URL and never touches
    # Docker, so the ephemeral database the backend boots against is this service.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    env:
      TEST_DB_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: extractions/setup-just@v3

      # Cache the 13 MB shallow bitbake clone. `just conformance` clones into
      # build/bitbake only on a cache miss; a hit restores it and the recipe reuses
      # it, so the conformance run needs zero network. Key on the pinned tag, which
      # the recipe's bb_tag must match -- bump both together.
      - name: Cache the bitbake checkout
        uses: actions/cache@v4
        with:
          path: build/bitbake
          key: bitbake-2.8.0

      # ubuntu-latest ships python3 and wget; the backend boots in-process, so there
      # is nothing else to install. A skip here fails the job -- that is the point.
      - name: Conformance (drive the REAL bitbake fetcher; a skip fails the job)
        run: just conformance

      - name: Upload the conformance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-log
          path: build/conformance.log

  # M3's gate, and DESIGN.md calls it non-negotiable. Two halves: bitbake's OWN hashserv
  # suite in external mode (BB_TEST_HASHSERV, authenticated with a real write-scoped key,
  # exact ran/failures/errors/skipped counts pinned), and the real bitbake-hashclient
  # binary -- which upstream's external suite never runs, because all its run_hashclient
  # call sites spawn a local unix:// python server instead.
  #
  # A SEPARATE job from `build`, like `conformance`: it needs a bitbake checkout and a
  # pinned python `websockets` that `build` has no use for. It runs through
  # `just hashserv-conformance`, where a skip FAILS -- a gate that skips itself and reports
  # green is the one outcome worse than having no gate.
  hashserv-conformance:
    runs-on: ubuntu-latest

    # Same postgres service as `build` and `conformance`: dbtest uses TEST_DB_URL and never
    # touches Docker, so the ephemeral database the backend boots against is this service.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    env:
      TEST_DB_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: extractions/setup-just@v3

      # ubuntu-latest's system python is EXTERNALLY-MANAGED (PEP 668): a bare
      # `pip3 install websockets` there dies with `error: externally-managed-environment`.
      # setup-python puts an interpreter we own first on PATH -- and it is the SAME python3
      # the Go harness exec.Commands and the same one `just hashserv-conformance` installs
      # the pinned websockets for, because all three resolve `python3` from PATH.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The same 13 MB shallow clone the `conformance` job caches, under the same key: one
      # checkout, cached once, restored by both. Key on the pinned tag, which the recipe's
      # bb_tag must match -- bump both together.
      - name: Cache the bitbake checkout
        uses: actions/cache@v4
        with:
          path: build/bitbake
          key: bitbake-2.8.0

      - name: Hashserv conformance (bitbake's own suite + the real hashclient; a skip fails the job)
        run: just hashserv-conformance

      - name: Upload the hashserv conformance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hashserv-conformance-log
          path: build/hashserv-conformance.log

  # M4's gate. Three clients: the remote-apis-sdks Go client driving all eight REAPI cache
  # RPCs over a real gRPC listener (no external binary -- runs everywhere dbtest reaches a
  # database), and the REAL ccache and sccache binaries against the /ac and sccache WebDAV
  # mounts. The recorder proves ccache hit /ac and never /cas, and that sccache did
  # PROPFIND-then-PUT (the silently-read-only trap).
  #
  # A SEPARATE job from `build`, like `conformance` and `hashserv-conformance`: it needs
  # ccache + sccache + a C compiler that `build` has no use for. It runs through
  # `just bazel-conformance`, where a skip FAILS -- a gate that skips itself and reports
  # green is the one outcome worse than having no gate.
  bazel-conformance:
    runs-on: ubuntu-latest

    # Same postgres service as the other jobs: dbtest uses TEST_DB_URL and never touches
    # Docker, so the ephemeral database the backends boot against is this service.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    env:
      TEST_DB_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: extractions/setup-just@v3

      # ccache from apt; sccache from its release binary (apt has no reliable sccache). No
      # setup action for sccache -- mozilla-actions/sccache-action exports SCCACHE_GHA_*
      # into the environment, which the suite's own sccache server would inherit and prefer
      # over the WebDAV backend under test. A bare binary on PATH leaves the env clean.
      # ubuntu-latest already ships gcc/cc, so the compiler the wrappers invoke is present.
      - name: Install ccache and sccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
          sccache_version=v0.8.2
          curl -fsSL "https://github.com/mozilla/sccache/releases/download/${sccache_version}/sccache-${sccache_version}-x86_64-unknown-linux-musl.tar.gz" | tar -xz
          sudo install "sccache-${sccache_version}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          ccache --version
          sccache --version

      - name: Bazel conformance (remote-apis-sdks + the real ccache and sccache; a skip fails the job)
        run: just bazel-conformance

      - name: Upload the bazel conformance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-conformance-log
          path: build/bazel-conformance.log

  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pre-commit/action@v3.0.1

  image:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    # hashserv-conformance is in this list, and that is the point of having written it: a
    # gate that runs, goes red, and still lets the image push to ghcr.io gates nothing.
    needs: [build, check, commit, conformance, hashserv-conformance, bazel-conformance]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No artifact download: unlike kbi, whose Dockerfile was FROM scratch over
      # a binary CI had already built, this Dockerfile is self-contained -- it
      # builds the frontend and compiles the binary from source itself.
      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/jsmith212/bakery:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.build-and-push.outputs.digest }}
