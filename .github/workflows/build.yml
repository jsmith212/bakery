name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # Pinned rather than read from web/package.json: that file declares no
      # `engines.node`, which is the only thing node-version-file reads there.
      # Keep this major in step with the node stage in the Dockerfile.
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: extractions/setup-just@v3

      - name: Check
        run: just check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: extractions/setup-just@v3

      - name: Build
        run: just build

      - name: Coverage
        run: just coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage*

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bakery
          path: build/bakery

  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pre-commit/action@v3.0.1

  image:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [build, check, commit]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No artifact download: unlike kbi, whose Dockerfile was FROM scratch over
      # a binary CI had already built, this Dockerfile is self-contained -- it
      # builds the frontend and compiles the binary from source itself.
      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/jsmith212/bakery:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.build-and-push.outputs.digest }}
